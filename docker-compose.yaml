services:
  db:
    container_name: open-uptime-bot-db
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
  oubot:
    container_name: open-uptime-bot
    image: open-uptime-bot:2026.3.21
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - default
    #   - caddy
    ports:
      - 8080:8080

